<div class="orders-container">
  <header class="page-header fade-in-up">
    <button class="btn-back" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <h1 class="page-title">Meus Pedidos</h1>
    <div class="header-placeholder"></div>
  </header>

  <main class="orders-content fade-in-up">
    @if (orders.length > 0) {
      <!-- A lista de pedidos reais será construída aqui com os dados do backend -->
    } @else {
      <!-- Empty State Elegante (Estilo iFood) -->
      <div class="empty-state">
        <div class="empty-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="empty-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
        </div>
        <h2>Nenhum histórico de pedidos</h2>
        <p>Você ainda não realizou nenhuma sessão com os nossos cookies. Volte para o cardápio e inicie seu tratamento!</p>
        <button class="btn-primary" [routerLink]="['/']">Ver Cardápio</button>
      </div>
    }
  </main>
</div>
