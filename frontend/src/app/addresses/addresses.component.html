<div class="addresses-container">
  <header class="page-header fade-in-up">
    <button class="btn-back" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <h1 class="page-title">Endereços de Entrega</h1>
    <div class="header-placeholder"></div>
  </header>

  <main class="addresses-content fade-in-up">
    @if (addresses.length > 0) {
      <!-- A lista de endereços reais será construída aqui com os dados do backend -->
    } @else {
      <!-- Empty State Elegante (Estilo app) -->
      <div class="empty-state">
        <div class="empty-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="empty-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
          </svg>
        </div>
        <h2>Nenhum endereço salvo</h2>
        <p>Você ainda não tem endereços de entrega cadastrados. Adicione um novo endereço para receber suas prescrições em casa!</p>
        <button class="btn-primary" (click)="goBack()">Adicionar Endereço</button>
      </div>
    }
  </main>
</div>
