<header class="app-header" [style.--bg-opacity]="bgOpacity()">
  <div class="header-pill" [class.scrolled]="scrolled()">
    <!-- Branding (Esquerda) -->
    <div class="brand" (click)="scrollToTop($event)">
      <div class="logo-icon">
        <img src="assets/fotos/logo-cookie.png" alt="SweetAg Cookies Logo" class="cookie-logo-img">
      </div>
      <div class="brand-text">
        <div class="brand-title-group">
          <span class="brand-title">SweetAg</span>
          <span class="brand-subtitle">Cookies</span>
        </div>
        <p class="brand-tagline">Sua dose diária de reforço positivo.</p>
      </div>
    </div>

    <!-- Navegação Desktop (Centro) -->
    <nav class="desktop-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/']" [class.active]="isActive('/')">
            <span class="nav-text">Home</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled-link">
            <span class="nav-text">Favoritos</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/cart']" [class.active]="isActive('/cart')">
            <div class="cart-link-content" [class.bump]="cartAnimating()">
              <span class="nav-text">Carrinho</span>
              <div class="cart-icon-wrapper">
                <!-- Sacola de compras estilizada -->
                <svg class="cart-svg-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                </svg>
                <span class="cart-badge" *ngIf="itemCount > 0">{{ itemCount }}</span>
              </div>
            </div>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Ações / Perfil (Direita) -->
    <div class="header-actions">
      <!-- Botão de carrinho compacto exclusivo para mobile (oculto no desktop) -->
      <a class="mobile-cart-btn" [routerLink]="['/cart']" [class.bump]="cartAnimating()">
        <div class="cart-icon-wrapper">
          <svg class="cart-svg-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
          </svg>
          <span class="cart-badge" *ngIf="itemCount > 0">{{ itemCount }}</span>
        </div>
      </a>

      <!-- Botão de Perfil / Login principal (estilo pill destacado) -->
      <a class="action-btn-login" [routerLink]="['/login']" [class.active]="isActive('/login')">
        <span class="btn-text">Entrar</span>
        <span class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </span>
      </a>
    </div>
  </div>
</header>
