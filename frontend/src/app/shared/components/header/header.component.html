<header class="app-header" [style.--bg-opacity]="bgOpacity()">
  <div class="header-pill" [class.scrolled]="scrolled()">
    <!-- Branding (Esquerda) -->
    <div class="brand" (click)="onLogoClick($event)">
      <div class="brand-text">
        <div class="brand-title-group">
          <span class="brand-title">SweetAg</span>
          <span class="brand-subtitle">Cookies</span>
        </div>
        <p class="brand-tagline">Sua dose diária de reforço positivo.</p>
      </div>
    </div>

    <!-- Navegação Desktop (Centro) -->
    <nav class="desktop-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/']" [class.active]="isActive('/')">
            <div class="home-link-content">
              <span class="nav-text">Home</span>
              <div class="home-icon-wrapper">
                <!-- Ícone de casinha estilizado -->
                <svg class="home-svg-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                </svg>
              </div>
            </div>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/favorites']" [class.active]="isActive('/favorites')">
            <div class="favorite-link-content">
              <span class="nav-text">Favoritos</span>
              <div class="favorite-icon-wrapper">
                <!-- Ícone de coração estilizado -->
                <svg class="favorite-svg-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                </svg>
              </div>
            </div>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/cart']" [class.active]="isActive('/cart')">
            <div class="cart-link-content" [class.bump]="cartAnimating()">
              <span class="nav-text">Carrinho</span>
              <div class="cart-icon-wrapper">
                <!-- Sacola de compras estilizada -->
                <svg class="cart-svg-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
                </svg>
                <span class="cart-badge" *ngIf="itemCount > 0">{{ itemCount }}</span>
              </div>
            </div>
          </a>
        </li>
      </ul>
    </nav>

    <!-- Ações / Perfil (Direita) -->
    <div class="header-actions">
      <!-- Botão de carrinho compacto exclusivo para mobile (oculto no desktop) -->
      <a class="mobile-cart-btn" [routerLink]="['/cart']" [class.bump]="cartAnimating()">
        <div class="cart-icon-wrapper">
          <svg class="cart-svg-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="2.2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
          </svg>
          <span class="cart-badge" *ngIf="itemCount > 0">{{ itemCount }}</span>
        </div>
      </a>

      <!-- Botão de Perfil / Login principal (estilo pill destacado) -->
      <a class="action-btn-login" [routerLink]="['/login']" [class.active]="isActive('/login')">
        <span class="btn-text">Entrar</span>
        <span class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </span>
      </a>
    </div>
  </div>
</header>
