<main class="auth-container">
  <div class="animated-background">
    <div class="cookie-anim cookie-1">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="#E7D7C1" stroke="#C4673A" stroke-width="4"/><circle cx="30" cy="40" r="6" fill="#5E4637"/><circle cx="70" cy="45" r="5" fill="#5E4637"/><circle cx="45" cy="70" r="7" fill="#5E4637"/><circle cx="65" cy="25" r="4" fill="#5E4637"/><circle cx="35" cy="65" r="5" fill="#5E4637"/></svg>
    </div>
    <div class="cookie-anim cookie-2">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="40" fill="#D4BEA3" stroke="#C4673A" stroke-width="3"/><circle cx="40" cy="30" r="4" fill="#2E1C12"/><circle cx="60" cy="60" r="6" fill="#2E1C12"/><circle cx="30" cy="55" r="5" fill="#2E1C12"/><circle cx="55" cy="35" r="4" fill="#2E1C12"/></svg>
    </div>
    <div class="cookie-anim cookie-3">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 5 C74.8 5 95 25.2 95 50 C95 74.8 74.8 95 50 95 C25.2 95 5 74.8 5 50 C5 39 8.7 28.7 15 20 C20 30 35 30 40 20 C45 10 35 -2 50 5 Z" fill="#E7D7C1" stroke="#C4673A" stroke-width="4" stroke-linejoin="round"/><circle cx="35" cy="45" r="6" fill="#5E4637"/><circle cx="65" cy="65" r="5" fill="#5E4637"/><circle cx="45" cy="75" r="7" fill="#5E4637"/><circle cx="70" cy="40" r="4" fill="#5E4637"/></svg>
    </div>
    <div class="cookie-anim cookie-4">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="35" fill="#F5ECD7" stroke="#7A9E7E" stroke-width="3"/><circle cx="45" cy="45" r="5" fill="#7A9E7E"/><circle cx="60" cy="55" r="4" fill="#7A9E7E"/><circle cx="40" cy="60" r="3" fill="#7A9E7E"/></svg>
    </div>
    <div class="cookie-anim cookie-5">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="25" fill="#E7D7C1" stroke="#5E4637" stroke-width="2"/><circle cx="45" cy="45" r="4" fill="#5E4637"/><circle cx="55" cy="55" r="3" fill="#5E4637"/></svg>
    </div>
    <div class="cookie-anim cookie-6">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="30" fill="#D4BEA3" stroke="#5E4637" stroke-width="3"/><circle cx="40" cy="40" r="4" fill="#5E4637"/><circle cx="60" cy="50" r="5" fill="#5E4637"/><circle cx="45" cy="60" r="3" fill="#5E4637"/></svg>
    </div>
    <div class="cookie-anim cookie-7">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 5 C74.8 5 95 25.2 95 50 C95 74.8 74.8 95 50 95 C25.2 95 5 74.8 5 50 C5 39 8.7 28.7 15 20 C20 30 35 30 40 20 C45 10 35 -2 50 5 Z" fill="#F5ECD7" stroke="#C4673A" stroke-width="4" stroke-linejoin="round"/><circle cx="45" cy="45" r="5" fill="#C4673A"/><circle cx="65" cy="65" r="6" fill="#C4673A"/><circle cx="40" cy="70" r="4" fill="#C4673A"/></svg>
    </div>
    <div class="cookie-anim cookie-8">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="42" fill="#E7D7C1" stroke="#7A9E7E" stroke-width="3"/><circle cx="35" cy="35" r="5" fill="#7A9E7E"/><circle cx="65" cy="45" r="6" fill="#7A9E7E"/><circle cx="50" cy="65" r="5" fill="#7A9E7E"/><circle cx="30" cy="60" r="4" fill="#7A9E7E"/></svg>
    </div>
    <div class="cookie-anim cookie-9">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="28" fill="#D4BEA3" stroke="#C4673A" stroke-width="2"/><circle cx="45" cy="45" r="3" fill="#2E1C12"/><circle cx="55" cy="55" r="4" fill="#2E1C12"/></svg>
    </div>
    <div class="cookie-anim cookie-10">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="38" fill="#E7D7C1" stroke="#5E4637" stroke-width="3"/><circle cx="35" cy="45" r="6" fill="#5E4637"/><circle cx="60" cy="35" r="5" fill="#5E4637"/><circle cx="65" cy="60" r="4" fill="#5E4637"/><circle cx="45" cy="65" r="5" fill="#5E4637"/></svg>
    </div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <h1>Sessão Inicial</h1>
      <p>Alimente sua mente. E sua fome.</p>
    </div>

    <form class="auth-form" (ngSubmit)="fazerLogin()" #authForm="ngForm">
      
      <!-- Campo WhatsApp -->
      <div class="input-group">
        <label for="whatsapp">Seu WhatsApp</label>
        <div class="input-wrapper">
          <i class="icon-whatsapp">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
          </i>
          <input 
            type="tel" 
            id="whatsapp" 
            name="whatsapp" 
            placeholder="(DDD) 99999-9999" 
            [ngModel]="whatsapp()"
            (ngModelChange)="whatsapp.set($event)"
            required
            autocomplete="tel"
          >
        </div>
        <small>Seu prontuário digital seguro. Usaremos só para atualizar do pedido.</small>
      </div>

      <!-- Campo Nome -->
      <div class="input-group">
        <label for="nome">Como devemos te chamar?</label>
        <div class="input-wrapper">
          <i class="icon-user">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </i>
          <input 
            type="text" 
            id="nome" 
            name="nome" 
            placeholder="Digite seu nome social" 
            [ngModel]="nome()"
            (ngModelChange)="nome.set($event)"
            required
          >
        </div>
        <button type="button" class="btn-generate-name" (click)="gerarNomeAutomatico()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l5.37-3.25"/></svg>
          Gerar nome clínico (divertido)
        </button>
      </div>

      <!-- Consentimento Notificações -->
      <div class="checkbox-group">
        <label class="custom-checkbox">
          <input 
            type="checkbox" 
            name="consentimento" 
            [ngModel]="aceitaNotificacoes()"
            (ngModelChange)="aceitaNotificacoes.set($event)"
            required
          >
          <span class="checkmark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </span>
          <span class="label-text">
            Aceito receber notificações importantes sobre a terapia do meu cookie via WhatsApp e Push.
          </span>
        </label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isSubmitting()">
        <span *ngIf="!isSubmitting()">Entrar no Consultório</span>
        <span *ngIf="isSubmitting()" class="loader">Analisando...</span>
      </button>

    </form>
    
    <div class="auth-footer">
      <p>Total sigilo paciente-cookie. Seus dados estão seguros.</p>
    </div>
  </div>
</main>
