<div class="profile-container">
  <!-- Header -->
  <header class="header">
    <button class="back-btn" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <h1>Meus Dados</h1>
    <div class="spacer"></div>
  </header>

  <main class="content">
    <!-- Avatar Section -->
    <section class="avatar-section">
      <div class="avatar-circle">
        <span>{{ getInitials() }}</span>
        <button class="edit-avatar-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
          </svg>
        </button>
      </div>
      <h2>{{ userName() }}</h2>
    </section>

    <!-- Info List -->
    <section class="info-card">
      <div class="info-row">
        <div class="info-content">
          <label>Nome Completo</label>
          <p>{{ userName() }}</p>
        </div>
      </div>
      
      <div class="divider"></div>

      <div class="info-row">
        <div class="info-content">
          <label>WhatsApp</label>
          <p>{{ userWhatsapp() }}</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="info-row">
        <div class="info-content">
          <label>Data de Nascimento</label>
          <p class="placeholder" *ngIf="userBirthday() === 'Adicionar data'; else bday">{{ userBirthday() }}</p>
          <ng-template #bday><p>{{ userBirthday() }}</p></ng-template>
        </div>
      </div>
    </section>

    <button class="edit-btn" (click)="editProfile()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
      Editar Informações
    </button>

    <!-- Settings Section -->
    <h3 class="section-title">Preferências</h3>
    <section class="settings-card">
      <div class="setting-row" (click)="toggleNotifications()">
        <div class="setting-info">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
          </div>
          <span>Notificações</span>
        </div>
        
        <!-- Toggle Switch -->
        <div class="toggle-switch" [class.active]="notificationsEnabled()">
          <div class="toggle-knob"></div>
        </div>
      </div>
    </section>

    <div class="danger-zone">
      <button class="delete-btn" (click)="deleteAccount()">
        Apagar Minha Conta
      </button>
    </div>
  </main>
</div>
