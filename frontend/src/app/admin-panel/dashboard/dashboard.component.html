<div class="admin-dashboard-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>🧠 SweetAg</h2>
      <span class="badge">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" class="nav-item active">📊 Dashboard</a>
      <!-- Add other placeholders here -->
    </nav>
    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout">🚪 Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="content-header">
      <div class="welcome">
        <h1>Olá, {{ adminName() }}!</h1>
        <p>Bem-vindo ao painel de controle do SweetAg Cookies.</p>
      </div>
    </header>

    <section class="dashboard-grid">
      <div class="dashboard-card">
        <h3>Painel Administrativo Iniciado</h3>
        <p>A autenticação com permissão restrita de administrador (RBAC) e o guarda de rotas de segurança foram implementados com sucesso!</p>
      </div>
    </section>
  </main>
</div>
